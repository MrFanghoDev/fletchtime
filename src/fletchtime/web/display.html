<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<title>FletchTime — Affichage</title>
<style>
  html, body { margin:0; height:100%; background:#111; color:white; font-family: sans-serif; overflow:hidden; }
  #root {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; transition: background-color 0.3s; position:relative;
    /* Réserve une bande fixe en haut pour #lane/#event-title-banner
       (positionnés en absolute, donc hors du flux normal) -- sans ça, le
       contenu centré verticalement (dont les images de cible) peut
       remonter jusqu'à chevaucher cette bande sur un écran bas ou un
       titre d'événement long. Constaté et corrigé après un vrai test :
       le simple repositionnement du titre ne suffisait pas. */
    padding-top: 4rem;
    box-sizing: border-box;
  }
  #time { font-size: 22vw; font-weight:bold; line-height:1; font-variant-numeric: tabular-nums; }
  #offline-indicator {
    display: none; position: fixed; top: 1rem; right: 1rem;
    font-size: 1rem; opacity: 0.35; letter-spacing: 0.05em;
  }
  #offline-indicator.visible { display: block; }
  #turn { font-size:6vw; margin-top:1rem; min-height:1.2em; text-align:center; }
  #dist { font-size:4vw; opacity:0.85; min-height:1.2em; }
  #target-images {
    display:flex; gap:2rem; justify-content:center; align-items:center;
    margin-bottom:1rem; min-height:1px;
  }
  #target-images img {
    max-height:20vh; max-width:22vw; object-fit:contain;
    border-radius:8px; background:white; padding:4px; display:none;
  }
  #lane { position:absolute; top:1rem; left:1rem; font-size:3vw; opacity:0.6; }
  #event-title-banner {
    position:absolute; top:1rem; right:1rem;
    font-size:2.8vw; opacity:0.7; max-width:45vw; text-align:right;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #message {
    position:absolute; bottom:2rem; font-size:4vw; background:rgba(0,0,0,0.6);
    padding:0.5rem 1.2rem; border-radius:10px; display:none;
  }
  /* Écran neutre (avant le concours ou après sa fin) -- diaporama qui
     alterne entre logo+horloge et les bannières sponsors déposées par le
     le club dans assets/banners/. */
  #idle { display:none; flex-direction:column; align-items:center; }
  #idle-logo { max-height:32vh; max-width:70vw; object-fit:contain; margin-bottom:1.5rem; }
  #idle-wordmark {
    display: none; font-size: 3vw; font-weight: 700; letter-spacing: 0.01em;
    margin: -1rem 0 1.5rem;
  }
  #idle-wordmark .fletch { color: #e8ebf1; }
  #idle-wordmark .time { color: #d1a13d; }
  #idle-date { font-size:4vw; opacity:0.85; }
  #idle-clock { font-size:9vw; font-weight:bold; font-variant-numeric: tabular-nums; margin-top:0.2em; }
  #idle-caption { font-size:3vw; opacity:0.6; margin-top:1.2rem; }
  #idle-banner {
    display:none; max-width:92vw; max-height:80vh; object-fit:contain;
  }
  .phase-wait { background:#1e1e1e; }
  .phase-red { background:#7f1d1d; }
  .phase-green { background:#14532d; }
  .phase-orange { background:#b45309; }
  .phase-pause { background:#374151; }
  .phase-emergency { background:#dc2626; animation: blink 0.6s steps(1) infinite; }
  .phase-finished { background:#1e1e1e; }
  @keyframes blink { 50% { background:#000; } }
</style>
</head>
<body>
  <div id="root" class="phase-wait">
    <div id="lane"></div>
    <div id="event-title-banner"></div>
    <div id="target-images">
      <img id="target-image-1" alt="" onerror="this.style.display='none';">
      <img id="target-image-2" alt="" onerror="this.style.display='none';">
    </div>
    <div id="time">--</div>
    <div id="offline-indicator"></div>
    <div id="turn"></div>
    <div id="dist"></div>
    <div id="idle">
      <img id="idle-logo" alt="Logo du club">
      <div id="idle-wordmark"><span class="fletch">Fletch</span><span class="time">Time</span></div>
      <div id="idle-date"></div>
      <div id="idle-clock"></div>
      <div id="idle-caption"></div>
    </div>
    <img id="idle-banner" alt="" onerror="this.style.display='none';">
    <div id="message"></div>
  </div>

<script src="i18n.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const lane = params.get("lane") || "?";
  // L'aperçu (dans la page de contrôle) ne doit jamais être une source de
  // son -- c'est un simple coup d'œil visuel pour le responsable du
  // chronométrage, pas un écran destiné aux archers. Sans ça, ouvrir la
  // page de contrôle ET un vrai écran d'affichage sur le même PC fait
  // entendre chaque son deux fois. `mute=1` permet en plus de couper le
  // son sur n'importe quel autre onglet ouvert en trop sur la même
  // machine (ex. pour jeter un œil à une autre lane sans dupliquer le
  // son de l'écran qui joue réellement pour les archers).
  const soundEnabled = lane !== "apercu" && params.get("mute") !== "1";
  let currentLanguage = localStorage.getItem("fletchtime_lang") || "fr";
  document.getElementById("lane").textContent = t(currentLanguage, "lane") + " " + lane;

  const root = document.getElementById("root");
  const timeEl = document.getElementById("time");
  const turnEl = document.getElementById("turn");
  const distEl = document.getElementById("dist");
  const msgEl = document.getElementById("message");
  const idleEl = document.getElementById("idle");
  const idleDateEl = document.getElementById("idle-date");
  const idleClockEl = document.getElementById("idle-clock");
  const idleCaptionEl = document.getElementById("idle-caption");
  const idleLogoEl = document.getElementById("idle-logo");

  // Essaie quelques noms/extensions courants pour le logo du club ; si
  // aucun n'existe, retombe sur le logo FletchTime lui-même plutôt que de
  // laisser un espace vide sur l'écran neutre (utile notamment juste après
  // une première installation, avant que le club n'ait déposé son logo).
  // Paramètre anti-cache : sans ça, un navigateur qui a déjà visité cette
  // même URL (même IP/port) sur un précédent lancement du serveur -- avec
  // un dossier de travail différent -- afficherait l'ancienne image mise
  // en cache plutôt que de revérifier auprès de ce nouveau serveur.
  const CLUB_LOGO_CANDIDATES = ["assets/club/logo.jpg", "assets/club/logo.png", "assets/club/logo.svg"];
  const cacheBuster = "?_=" + Date.now();
  const idleWordmarkEl = document.getElementById("idle-wordmark");
  function tryClubLogo(index) {
    if (index >= CLUB_LOGO_CANDIDATES.length) {
      idleLogoEl.onerror = null;
      idleLogoEl.src = "logo.svg" + cacheBuster;
      idleLogoEl.alt = "FletchTime";
      idleWordmarkEl.style.display = "block";
      return;
    }
    idleLogoEl.onerror = () => tryClubLogo(index + 1);
    idleLogoEl.src = CLUB_LOGO_CANDIDATES[index] + cacheBuster;
  }
  tryClubLogo(0);
  const idleBannerEl = document.getElementById("idle-banner");
  const eventTitleBannerEl = document.getElementById("event-title-banner");
  const targetImage1El = document.getElementById("target-image-1");
  const targetImage2El = document.getElementById("target-image-2");

  // Empêche l'écran de la tablette de s'éteindre pendant l'affichage.
  // Sans ça, Android met le navigateur en veille réseau dès l'extinction
  // de l'écran et la connexion WebSocket finit par timeout côté serveur.
  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) {
        await navigator.wakeLock.request("screen");
      }
    } catch (e) { /* refusé (batterie faible, etc.) -- pas bloquant */ }
  }
  requestWakeLock();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") requestWakeLock();
  });

  // Horloge locale, indépendante du serveur -- tourne tant que la page est
  // ouverte, y compris avant qu'une première mise à jour WebSocket arrive.
  function updateIdleClock() {
    const now = new Date();
    const locale = currentLanguage === "en" ? "en-GB" : "fr-FR";
    idleDateEl.textContent = new Intl.DateTimeFormat(locale, {
      weekday: "long", year: "numeric", month: "long", day: "numeric",
    }).format(now);
    idleClockEl.textContent = new Intl.DateTimeFormat(locale, {
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    }).format(now);
  }
  updateIdleClock();
  setInterval(updateIdleClock, 1000);

  // Diaporama de l'écran neutre : alterne logo+horloge et les bannières
  // sponsors déposées par le le club dans assets/banners/. Découverte
  // automatique via le listing de répertoire du serveur HTTP -- pas besoin
  // d'un système d'upload, juste déposer les fichiers dans le dossier.
  const SLIDE_DURATION_MS = 8000;
  const IMAGE_EXTENSIONS = /\.(jpe?g|png|gif|webp|svg)$/i;
  let bannerImages = [];
  let slideshowTimer = null;

  async function discoverBanners() {
    try {
      const res = await fetch("assets/banners/");
      if (!res.ok) { bannerImages = []; return; }
      const html = await res.text();
      const hrefs = [...html.matchAll(/href="([^"]+)"/g)].map(m => decodeURIComponent(m[1]));
      bannerImages = hrefs
        .filter(href => IMAGE_EXTENSIONS.test(href) && !href.startsWith(".."))
        .map(href => "assets/banners/" + href);
    } catch (e) {
      bannerImages = [];  // dossier absent ou serveur ne supporte pas le listing -- pas grave
    }
  }
  discoverBanners();
  setInterval(discoverBanners, 60000);  // reprend les nouveaux fichiers sans relancer le serveur

  function currentSlideshowStep() {
    // Dérivé de l'horloge murale (pas d'un compteur local incrémenté
    // indépendamment par chaque page) : deux écrans qui chargent ou se
    // reconnectent à des instants différents affichaient sinon des
    // slides différentes au même moment, puisque chacun repartait de 0
    // à son propre démarrage -- voir docs/architecture.md.
    const totalSlides = bannerImages.length + 1;  // +1 pour le slide logo/horloge
    return Math.floor(Date.now() / SLIDE_DURATION_MS) % totalSlides;
  }

  function showSlideshowStep() {
    const step = currentSlideshowStep();
    const isBannerSlide = step > 0 && step <= bannerImages.length;
    idleLogoEl.style.display = isBannerSlide ? "none" : "";
    if (isBannerSlide) idleWordmarkEl.style.display = "none";
    else if (idleLogoEl.alt === "FletchTime") idleWordmarkEl.style.display = "block";
    idleDateEl.style.display = isBannerSlide ? "none" : "";
    idleClockEl.style.display = isBannerSlide ? "none" : "";
    idleCaptionEl.style.display = isBannerSlide ? "none" : "";
    if (isBannerSlide) {
      idleBannerEl.src = bannerImages[step - 1];
      idleBannerEl.style.display = "block";
    } else {
      idleBannerEl.style.display = "none";
    }
  }

  function startSlideshow() {
    if (slideshowTimer) return;  // déjà en cours
    showSlideshowStep();
    // Vérifie chaque seconde (bien plus souvent que SLIDE_DURATION_MS) :
    // comme currentSlideshowStep() se recalcule à chaque appel à partir
    // de l'horloge murale, tous les écrans convergent vers la même
    // slide dans la seconde qui suit une transition, peu importe le
    // décalage entre leurs démarrages respectifs.
    slideshowTimer = setInterval(showSlideshowStep, 1000);
  }

  function stopSlideshow() {
    if (slideshowTimer) {
      clearInterval(slideshowTimer);
      slideshowTimer = null;
    }
    idleBannerEl.style.display = "none";
  }

  // Sons du pack actif (fichiers réels dans assets/sounds/packs/<pack>/) --
  // repli sur un bip synthétisé (Web Audio) si le fichier est absent, pour
  // que ça reste fonctionnel même sans pack complet.
  const SOUND_EVENTS = {
    prep_start:     { freq: 440, duration: 0.2 },
    shoot_start:    { freq: 880, duration: 0.5 },
    warning_orange: { freq: 660, duration: 0.2 },
    countdown_tick: { freq: 550, duration: 0.12 },
    emergency_start:{ freq: 220, duration: 0.7 },
    emergency_end:  { freq: 740, duration: 0.3 },
    end_of_volee:   { freq: 500, duration: 0.3 },
    pause_start:    { freq: 500, duration: 0.25 },
    pause_end:      { freq: 600, duration: 0.25 },
    end_of_match:   { freq: 950, duration: 0.9 },
  };
  const AUDIO_EXTENSIONS = ["wav", "mp3", "ogg"];
  let currentSoundPack = "classic";
  // Mémorise, par événement, quelle extension a fonctionné (ou `null` si
  // aucune -- repli définitif sur le bip) : évite de refaire toute la
  // chaîne d'essais à chaque déclenchement (important pour countdown_tick,
  // qui se déclenche plusieurs fois de suite en rafale).
  let resolvedSoundExtension = {};

  function beep(freq, duration) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* certains navigateurs bloquent l'audio avant interaction utilisateur */ }
  }

  function playResolvedSound(eventName, ext) {
    if (ext === null) {
      const fallback = SOUND_EVENTS[eventName] || { freq: 500, duration: 0.2 };
      beep(fallback.freq, fallback.duration);
      return;
    }
    const url = "assets/sounds/packs/" + currentSoundPack + "/" + eventName + "." + ext;
    new Audio(url).play().catch(() => { /* lecture bloquée par le navigateur */ });
  }

  function probeExtension(eventName, extIndex) {
    if (extIndex >= AUDIO_EXTENSIONS.length) {
      resolvedSoundExtension[eventName] = null;
      playResolvedSound(eventName, null);
      return;
    }
    const ext = AUDIO_EXTENSIONS[extIndex];
    const url = "assets/sounds/packs/" + currentSoundPack + "/" + eventName + "." + ext;
    const probe = new Audio(url);
    probe.addEventListener("canplaythrough", () => {
      if (!(eventName in resolvedSoundExtension)) resolvedSoundExtension[eventName] = ext;
    }, { once: true });
    probe.addEventListener("error", () => probeExtension(eventName, extIndex + 1), { once: true });
    // Cette première tentative sert aussi de lecture réelle -- pas besoin
    // de rejouer une deuxième fois une fois résolue.
    probe.play().catch(() => { /* lecture bloquée par le navigateur */ });
  }

  function playEventSound(eventName) {
    if (!soundEnabled) return;
    if (eventName in resolvedSoundExtension) {
      playResolvedSound(eventName, resolvedSoundExtension[eventName]);
    } else {
      probeExtension(eventName, 0);
    }
  }

  // Reconnexion automatique : si le WiFi coupe un instant ou que l'écran
  // s'est éteint malgré le wake lock, on retente régulièrement plutôt que
  // de rester bloqué sur un état figé.
  //
  // Pendant la coupure, le chrono continue de décompter localement à
  // partir du dernier état reçu (extrapolation basée sur le temps
  // réellement écoulé, mesuré via performance.now() -- même principe que
  // fletchtime.server.match_server.tick_loop côté serveur, voir
  // docs/architecture.md) : les archers voient un chrono qui continue de
  // tourner plutôt qu'un écran figé ou vide pendant une coupure brève.
  // Volontairement limité aux seules phases de décompte actif (rouge/
  // vert/orange) -- jamais de tentative de deviner la transition vers la
  // phase suivante (fin de volée, walk-up...) sans confirmation du
  // serveur, ce qui demanderait de dupliquer toute la logique de
  // séquencement côté client. Dès la reconnexion, le premier état reçu du
  // serveur fait autorité et corrige immédiatement toute dérive locale.
  let isConnected = false;
  let lastPayload = null;
  let lastReceivedAt = null;
  let extrapolationTimer = null;
  // Port WebSocket réel, interrogé une seule fois via /api/version --
  // ne peut plus être codé en dur depuis que les ports sont devenus
  // modifiables (voir fletchtime.gui, config_store.load_gui_config).
  // 8765 sert uniquement de repli si cette requête échoue pour une
  // raison quelconque (jamais utilisé en pratique, l'API répond depuis
  // le même serveur qui vient de servir cette page).
  let wsPort = 8765;

  async function fetchWsPort() {
    try {
      const res = await fetch("/api/version");
      const data = await res.json();
      if (data.ws_port) wsPort = data.ws_port;
    } catch (e) {
      // Repli silencieux sur la valeur par défaut ci-dessus.
    }
  }

  function connect() {
    const ws = new WebSocket("ws://" + location.hostname + ":" + wsPort);

    ws.onopen = () => {
      isConnected = true;
      ws.send(JSON.stringify({action: "register_display", lane: lane}));
    };

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);
      if (data.type === "state") {
        stopExtrapolating();
        lastPayload = data;
        lastReceivedAt = performance.now();
        render(data, false);
      } else if (data.type === "events") {
        data.events.forEach(ev => playEventSound(ev));
      }
    };

    ws.onclose = () => {
      isConnected = false;
      startExtrapolating();
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }
  fetchWsPort().then(connect);

  let extrapolationOrangeFired = false;
  let extrapolationTicksFired = new Set();

  function startExtrapolating() {
    stopExtrapolating();
    extrapolationOrangeFired = false;
    extrapolationTicksFired = new Set();
    const state = lastPayload && lastPayload.state;
    const isCountingDown = state && !state.finished
      && (state.phase === "red" || state.phase === "green" || state.phase === "orange");
    if (!isCountingDown) {
      // Pas de décompte actif à faire "continuer tout seul" (écran neutre,
      // pause, urgence...) -- se contente d'afficher l'écran neutre comme
      // avant, aucune extrapolation à risquer.
      render({state: null, message: null}, false);
      return;
    }
    // Si la coupure survient alors qu'on est déjà orange, pas besoin de
    // re-déclencher le son -- seulement suivre la transition si elle
    // arrive PENDANT la coupure.
    if (state.phase === "orange") extrapolationOrangeFired = true;

    extrapolationTimer = setInterval(() => {
      const elapsed = (performance.now() - lastReceivedAt) / 1000;
      const newTimeLeft = Math.max(0, state.time_left - elapsed);
      const extrapolated = JSON.parse(JSON.stringify(lastPayload));
      extrapolated.state.time_left = newTimeLeft;

      // Reproduit localement le passage à l'orange, à partir du seuil
      // transmis par le serveur pour l'étape en cours (même logique que
      // MatchEngine.current_state côté serveur, voir
      // docs/architecture.md) -- jamais de tentative de deviner une
      // transition vers l'étape SUIVANTE, seulement ce changement de
      // couleur au sein de la même étape.
      const threshold = state.orange_threshold;
      const hasCrossedThreshold = threshold !== null && threshold !== undefined
        && newTimeLeft <= threshold;
      if (hasCrossedThreshold) {
        if (!extrapolationOrangeFired) {
          extrapolationOrangeFired = true;
          playEventSound("warning_orange");
        }
        extrapolated.state.phase = "orange";
      }

      // Reproduit localement les bips des dernières secondes, à partir du
      // nombre de secondes transmis par le serveur (réglage global, voir
      // config.html section Son) -- une seule fois par seconde entière
      // franchie, même logique que MatchEngine._maybe_emit_countdown_ticks.
      const tickSeconds = lastPayload.countdown_tick_seconds;
      if (tickSeconds) {
        for (let s = tickSeconds; s >= 1; s--) {
          if (newTimeLeft <= s && !extrapolationTicksFired.has(s)) {
            extrapolationTicksFired.add(s);
            playEventSound("countdown_tick");
          }
        }
      }

      render(extrapolated, true);
    }, 200);
  }

  function stopExtrapolating() {
    if (extrapolationTimer) {
      clearInterval(extrapolationTimer);
      extrapolationTimer = null;
    }
  }

  function render(payload, isExtrapolated) {
    const offlineIndicatorEl = document.getElementById("offline-indicator");
    offlineIndicatorEl.classList.toggle("visible", !!isExtrapolated);
    offlineIndicatorEl.textContent = isExtrapolated ? "⏱" : "";
    if (payload.language && payload.language !== currentLanguage) {
      currentLanguage = payload.language;
      localStorage.setItem("fletchtime_lang", currentLanguage);
      document.getElementById("lane").textContent = t(currentLanguage, "lane") + " " + lane;
    }

    eventTitleBannerEl.textContent = payload.event_title || "";

    if (payload.sound_pack && payload.sound_pack !== currentSoundPack) {
      currentSoundPack = payload.sound_pack;
      resolvedSoundExtension = {};
    }

    const state = payload.state;
    const isIdle = !state || state.finished;

    if (isIdle) {
      root.className = (state && state.finished) ? "phase-finished" : "phase-wait";
      // Efface tout style personnalisé laissé par la dernière phase
      // active -- sans ça, une couleur personnalisée (voir plus bas)
      // resterait affichée sur l'écran neutre, qui n'utilise que la
      // classe CSS phase-wait/phase-finished, jamais un style en ligne.
      root.style.backgroundColor = "";
      timeEl.style.display = "none";
      turnEl.style.display = "none";
      distEl.style.display = "none";
      targetImage1El.style.display = "none";
      targetImage2El.style.display = "none";
      idleEl.style.display = "flex";
      idleCaptionEl.textContent = isConnected ? "" : t(currentLanguage, "connectingCaption");
      startSlideshow();
    } else {
      stopSlideshow();
      idleEl.style.display = "none";
      timeEl.style.display = "";
      turnEl.style.display = "";
      distEl.style.display = "";

      root.className = "phase-" + state.phase;
      // Couleur personnalisable depuis la page de configuration (voir
      // config_store.DEFAULT_APP_CONFIG, match_server._phase_colors) --
      // appliquée en style direct, par-dessus la couleur par défaut du
      // CSS. Repli sur cette dernière si le serveur ne renvoie pas
      // phase_colors pour une raison quelconque (ancienne version du
      // serveur, par exemple), plutôt que de planter ou d'afficher du
      // transparent. Le clignotement de la phase urgence (@keyframes
      // blink) continue de fonctionner par-dessus : une animation CSS a
      // priorité sur un style en ligne pour la propriété qu'elle anime,
      // tant qu'elle est active -- vérifié avec un vrai rendu.
      if (payload.phase_colors && payload.phase_colors[state.phase]) {
        root.style.backgroundColor = payload.phase_colors[state.phase];
      }
      timeEl.textContent = state.phase === "pause" ? "⏸" : Math.ceil(state.time_left);
      turnEl.textContent = state.phase === "pause"
        ? t(currentLanguage, "retrieving")
          + (state.current_turn || (state.arrow_in_end ? (t(currentLanguage, "arrowWord") + " " + state.arrow_in_end) : ""))
        : (state.current_turn
            ? state.current_turn
            : (state.arrow_in_end ? (t(currentLanguage, "arrowWord") + " " + state.arrow_in_end + "/" + state.total_arrows_in_end) : ""));

      const serieLabel = t(currentLanguage, "series") + " " + state.unit_number;
      const voleeLabel = state.end_number ? t(currentLanguage, "volee") + " " + state.end_number + "/" + state.total_ends : "";
      distEl.textContent = state.distance_label
        ? (serieLabel + " — " + voleeLabel + " — " + state.distance_label)
        : (serieLabel + (voleeLabel ? " — " + voleeLabel : ""));

      // Une seule image (Flint) ou deux côte à côte (Indoor : recourbe/trad
      // à gauche, poulies à droite) -- masquée si le champ est vide.
      if (state.target_image) {
        targetImage1El.src = state.target_image;
        targetImage1El.style.display = "inline-block";
      } else {
        targetImage1El.style.display = "none";
      }
      if (state.target_image_2) {
        targetImage2El.src = state.target_image_2;
        targetImage2El.style.display = "inline-block";
      } else {
        targetImage2El.style.display = "none";
      }
    }

    // Le message ne doit jamais déconcentrer les archers en plein tir :
    // affiché seulement hors-concours, en pause (ramassage des flèches)
    // ou en urgence -- jamais pendant rouge/vert/orange.
    const safeToShowMessage = !state || state.finished
      || state.phase === "pause" || state.phase === "emergency";

    if (payload.message && safeToShowMessage) {
      msgEl.textContent = payload.message;
      msgEl.style.display = "block";
    } else {
      msgEl.style.display = "none";
    }
  }
</script>
</body>
</html>
