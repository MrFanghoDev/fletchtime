name: Exécutables autoporteurs (release)

# Construit un exécutable autoporteur pour Windows (.zip), Linux et macOS
# (.tar.gz) via PyInstaller, sur les runners natifs de GitHub Actions
# (PyInstaller ne fait pas de cross-compilation : chaque binaire est
# produit par un runner de la plateforme correspondante). Construit aussi
# une archive de la documentation HTML générée (Sphinx) telle qu'elle
# était à ce tag précis -- utile pour consulter la doc correspondant
# exactement à une version installée, indépendamment de ce qui est publié
# sur GitHub Pages (qui reflète toujours la dernière version de `main`,
# voir docs.yml et le point d'attention "/latest/" du backlog dans
# docs/roadmap.md).
#
# Déclenchement : push d'un tag de version (ex. v0.1.0) publie une vraie
# Release GitHub avec les quatre archives (Windows, Linux, macOS, doc).
# Un push de branche touchant à l'empaquetage (src/, fletchtime.spec,
# pyproject.toml) ou un lancement manuel depuis l'onglet Actions
# construisent aussi les exécutables, mais SANS publier de Release --
# artefacts téléchargeables directement depuis la page du run (section
# "Artifacts" en bas de page). Objectif : détecter un souci d'empaquetage
# (ex. module manquant à l'exécution) sans attendre une vraie release.
#
# macOS -- limites connues, jamais vérifiées sur une vraie machine (voir
# docs/dev-guide/index.md) : fletchtime.spec ne définit pas de cible
# BUNDLE(), donc ce build produit un simple dossier (comme Linux), pas une
# vraie .app cliquable avec icône dans le Dock. Gatekeeper bloquera aussi
# plus agressivement qu'un simple SmartScreen Windows, faute de
# certificat/notarisation Apple (absent ici). Runner GitHub Actions en
# Apple Silicon (ARM64) par défaut -- un Mac Intel pourrait nécessiter
# Rosetta 2 ou un build séparé.
permissions:
  contents: write
  
on:
  push:
    tags:
      - "v*.*.*"
    branches: [main, master]
    paths:
      - "src/**"
      - "fletchtime.spec"
      - "pyproject.toml"
      - ".github/workflows/release.yml"
      # Ne construit QUE les exécutables sur un push de branche (le job
      # `release`, qui publie une vraie Release GitHub, reste réservé aux
      # tags -- voir son `if:` plus bas). Objectif : donner un artefact
      # téléchargeable à chaque changement touchant potentiellement
      # l'empaquetage, sans attendre une release pour détecter un souci
      # PyInstaller (ex. module manquant à l'exécution, jamais détecté par
      # `ci.yml` qui ne construit pas d'exécutable du tout).
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false  # une plateforme qui échoue ne doit pas annuler les
                         # autres -- important pour comparer leurs résultats
                         # en cas de souci d'empaquetage spécifique à l'une
                         # d'elles (voir docs/dev-guide/index.md)
      matrix:
        include:
          - os: windows-latest
            archive_name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-windows.zip

          - os: ubuntu-latest
            archive_name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-linux.tar.gz

          - os: macos-latest
            archive_name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-macos.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet (tags compris) -- nécessaire à
                           # setuptools_scm pour déterminer la version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets customtkinter
          # Installe aussi le paquet lui-même (pas juste ses dépendances) :
          # c'est cette étape qui déclenche setuptools_scm et génère
          # src/fletchtime/_version.py avec la version dérivée du tag --
          # sans elle, PyInstaller (qui lit les sources directement via
          # pathex, sans jamais "construire" le paquet) ne trouve jamais ce
          # fichier, et fletchtime.__version__ retombe sur le repli "dev"
          # même sur un vrai tag de release.
          pip install -e .

      - name: Construire l'exécutable
        run: |
          pyinstaller fletchtime.spec

      - name: Vérifier le contenu de dist
        shell: bash
        run: |
          echo "Runner : $RUNNER_OS"
          pwd
          ls -R dist

      - name: Test de fumée -- l'exécutable démarre et sert la vraie page d'accueil (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist/FletchTime
          ./FletchTime --headless &
          SERVER_PID=$!
          sleep 3
          RESPONSE=$(curl -sf http://127.0.0.1:8000/)
          kill $SERVER_PID 2>/dev/null || true
          echo "$RESPONSE" | grep -q "FletchTime" || {
            echo "ÉCHEC : la page d'accueil ne contient pas 'FletchTime' -- probablement le"
            echo "dossier web/ introuvable (ex. régression du contenu de PyInstaller _internal/)."
            echo "--- Réponse reçue ---"
            echo "$RESPONSE"
            exit 1
          }
          echo "OK -- la page d'accueil répond correctement."

      - name: Test de fumée -- l'exécutable démarre et sert la vraie page d'accueil (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Push-Location dist/FletchTime
          Start-Process -FilePath ".\FletchTime.exe" -ArgumentList "--headless" -WindowStyle Hidden
          Start-Sleep -Seconds 3
          try {
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:8000/" -UseBasicParsing
          } finally {
            Stop-Process -Name "FletchTime" -Force -ErrorAction SilentlyContinue
          }
          Pop-Location
          if ($response.Content -notmatch "FletchTime") {
            Write-Host "ÉCHEC : la page d'accueil ne contient pas 'FletchTime' -- probablement le"
            Write-Host "dossier web/ introuvable (ex. régression du contenu de PyInstaller _internal/)."
            Write-Host "--- Réponse reçue ---"
            Write-Host $response.Content
            exit 1
          }
          Write-Host "OK -- la page d'accueil répond correctement."

      - name: Créer l'archive Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
         Compress-Archive `
           -Path dist/FletchTime/* `
           -DestinationPath dist/${{ matrix.archive_name }}

      - name: Créer l'archive Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf ${{ matrix.archive_name }} FletchTime

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet (tags compris) -- nécessaire à
                           # setuptools_scm pour déterminer la version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer le paquet et les dépendances de la doc
        run: |
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Construire la doc HTML
        run: sphinx-build -b html docs docs/_build/html

      - name: Créer l'archive de la doc
        env:
          ARCHIVE_NAME: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-docs.tar.gz
        run: |
          tar -czf "$ARCHIVE_NAME" -C docs/_build/html .

      - uses: actions/upload-artifact@v4
        with:
          name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-docs.tar.gz
          path: FletchTime-*-docs.tar.gz

  release:
    needs: [build, build-docs]

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publier la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
