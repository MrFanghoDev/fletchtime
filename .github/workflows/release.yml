name: Exécutables autoporteurs (release)

# Construit un exécutable autoporteur pour Windows (.zip) et Linux (.tar.gz)
# via PyInstaller, sur les runners natifs de GitHub Actions (PyInstaller ne
# fait pas de cross-compilation : le binaire Windows est produit par un
# runner Windows, le binaire Linux par un runner Linux).
#
# Déclenchement : push d'un tag de version (ex. v0.1.0), ou manuellement
# depuis l'onglet Actions. Les deux archives sont jointes à une Release
# GitHub créée automatiquement.
permissions:
  contents: write
  
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            archive_name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-windows.zip

          - os: ubuntu-latest
            archive_name: FletchTime-${{ (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'dev' }}-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets

      - name: Construire l'exécutable
        run: |
          pyinstaller fletchtime.spec

      - name: Vérifier le contenu de dist
        shell: bash
        run: |
          echo "Runner : $RUNNER_OS"
          pwd
          ls -R dist

      - name: Créer l'archive Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
         Compress-Archive `
           -Path dist/FletchTime/* `
           -DestinationPath dist/${{ matrix.archive_name }}

      - name: Créer l'archive Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf ${{ matrix.archive_name }} FletchTime

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  release:
    needs: build

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publier la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
