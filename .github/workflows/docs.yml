name: Documentation développeur (GitHub Pages)

# Construit la doc Sphinx/MyST (docs/) et la publie sur GitHub Pages à
# chaque push sur main qui touche à la doc. Ne concerne QUE la doc
# développeur -- le manuel utilisateur (web/manual.html) est servi
# localement par le serveur FletchTime lui-même, pas publié ici.
#
# Configuration ponctuelle nécessaire (une seule fois, sur GitHub) :
#   Settings -> Pages -> Source: "GitHub Actions"

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"  # sans ça, taguer une release ne redéclenche jamais ce
                   # workflow (un push de tag n'est pas un push de branche) --
                   # la doc publiée restait bloquée sur la version de dev du
                   # dernier push de branche, jamais la version propre de la
                   # release qu'on vient de taguer. Les filtres `paths`
                   # ci-dessous ne s'appliquent de toute façon pas aux push
                   # de tags (comportement documenté par GitHub) : un tag
                   # reconstruit donc toujours la doc, peu importe si
                   # docs/src ont changé -- exactement ce qu'on veut ici.
    paths:
      - "docs/**"
      - "src/**"  # la référence API (docs/api-reference.md) documente le
                   # code source via autodoc -- doit se reconstruire aussi
                   # quand le code change, pas juste la doc écrite à la main
      - ".github/workflows/docs.yml"
  workflow_dispatch:  # permet aussi un lancement manuel depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet (tags compris) -- nécessaire à
                           # setuptools_scm pour déterminer la version (voir
                           # pyproject.toml et docs/conf.py)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer le paquet et les dépendances de la doc
        run: |
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Construire la doc HTML
        run: sphinx-build -b html docs docs/_build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
