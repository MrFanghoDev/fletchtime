name: Publier sur TestPyPI

# TestPyPI est une instance séparée de PyPI, dédiée aux essais : permet de
# vérifier qu'un paquet se construit et s'installe correctement avant de
# publier "pour de vrai" sur PyPI (qui, lui, ne permet jamais de re-uploader
# ou supprimer un numéro de version une fois publié).
#
# Se déclenche à chaque push sur main/master qui touche au code ou à
# pyproject.toml, ou manuellement. Génère un numéro de version unique à
# chaque fois (`0.1.0.devN`) pour ne jamais se heurter à un conflit de
# version sur TestPyPI -- la version "propre" (`0.1.0`) reste réservée à la
# vraie publication PyPI, déclenchée séparément par une Release GitHub
# (voir pypi.yml).
#
# Configuration ponctuelle nécessaire (une seule fois, sur TestPyPI) :
#   1. Crée un compte sur https://test.pypi.org -- INDÉPENDANT de ton
#      compte pypi.org, il faut s'inscrire séparément.
#   2. https://test.pypi.org/manage/account/publishing/ -- ajoute un
#      "trusted publisher" :
#      - PyPI Project Name: fletchtime
#      - Owner: MrFanghoDev
#      - Repository name: fletchtime
#      - Workflow name: testpypi.yml
#      - Environment name: testpypi (doit correspondre à l'environment ci-dessous)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/testpypi.yml"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/fletchtime/
    permissions:
      id-token: write  # requis pour le Trusted Publishing (OIDC), pas de jeton secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Donner un numéro de version unique (évite les conflits sur TestPyPI)
        run: |
          BASE_VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          DEV_VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          sed -i "s/^version = \".*\"/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "Version publiée sur TestPyPI : ${DEV_VERSION}"

      - name: Installer les outils de build
        run: pip install build

      - name: Construire la distribution (sdist + wheel)
        run: python -m build

      - name: Publier sur TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
