<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Fletchtime">
  <!-- Blason d'archerie (couleurs World Archery, du centre vers l'extérieur) -->
  <circle cx="50" cy="50" r="46" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="37" fill="#0f172a"/>
  <circle cx="50" cy="50" r="28" fill="#2563eb"/>
  <circle cx="50" cy="50" r="19" fill="#dc2626"/>
  <circle cx="50" cy="50" r="10" fill="#facc15"/>

  <!-- Aiguilles façon chronomètre, superposées au blason -->
  <line x1="50" y1="50" x2="50" y2="22" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="70" y2="50" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="4.5" fill="#111827"/>
</svg>
