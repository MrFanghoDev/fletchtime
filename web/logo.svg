<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 130" width="130" height="130" role="img" aria-label="FletchTime">
  <!-- Cadran d'horloge : fond sombre, cerclage et graduations dorés -->
  <circle cx="65" cy="65" r="42" fill="#141414" stroke="#d1a13d" stroke-width="4"/>

  <!-- Graduations principales (12/3/6/9) -->
  <g stroke="#d1a13d" stroke-width="3.2" stroke-linecap="round">
    <line x1="65" y1="27" x2="65" y2="34"/>
    <line x1="103" y1="65" x2="96" y2="65"/>
    <line x1="65" y1="103" x2="65" y2="96"/>
    <line x1="27" y1="65" x2="34" y2="65"/>
  </g>
  <!-- Graduations secondaires -->
  <g stroke="#a3823f" stroke-width="1.6" stroke-linecap="round">
    <line x1="90.5" y1="39.5" x2="86" y2="44"/>
    <line x1="90.5" y1="90.5" x2="86" y2="86"/>
    <line x1="39.5" y1="90.5" x2="44" y2="86"/>
    <line x1="39.5" y1="39.5" x2="44" y2="44"/>
  </g>

  <!-- Petits traits de mouvement : horizontaux, même longueur, en éventail
       avec le début (le plus proche du cadran) qui s'éloigne progressivement,
       effet dégradé, rapprochés du cadran -->
  <g stroke="#d1a13d" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="20" y1="38" x2="32" y2="38"/>
    <line x1="14" y1="30" x2="26" y2="30"/>
    <line x1="8"  y1="22" x2="20" y2="22"/>
  </g>
  <g stroke="#d1a13d" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="98"  y1="92"  x2="110" y2="92"/>
    <line x1="104" y1="100" x2="116" y2="100"/>
    <line x1="110" y1="108" x2="122" y2="108"/>
  </g>

  <!-- Flèche = aiguille de l'horloge, réduite pour tenir dans le cadran -->
  <g transform="rotate(-55 65 65)">
    <!-- empennage (fletching) : évasé vers l'arrière, pointe côté hampe -->
    <polygon points="44,63 27,50 38,64" fill="#d1a13d"/>
    <polygon points="44,67 27,80 38,66" fill="#a3823f"/>
    <!-- hampe -->
    <rect x="44" y="62" width="48" height="6" fill="#d1a13d"/>
    <!-- pointe -->
    <polygon points="92,52 103,65 92,78" fill="#d1a13d"/>
  </g>
</svg>
