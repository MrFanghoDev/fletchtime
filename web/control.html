<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fletchtime — Contrôle</title>
<style>
  body { font-family: sans-serif; background:#111; color:#eee; padding:1rem; margin:0; }
  h1 { font-size:1.3rem; }
  button {
    font-size:1.05rem; padding:0.7rem 1rem; margin:0.25rem; border-radius:8px;
    border:none; cursor:pointer; color:white;
  }
  .start { background:#2563eb; }
  .next { background:#16a34a; }
  .danger { background:#dc2626; }
  .neutral { background:#4b5563; }
  section { margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #333; }
  #status { font-size:0.9rem; opacity:0.7; margin-bottom:0.5rem; }
  #state {
    white-space:pre-wrap; background:#000; padding:0.8rem; border-radius:8px;
    font-family:monospace; font-size:0.85rem; max-height:40vh; overflow:auto;
  }
  input[type=text] { padding:0.6rem; width:55%; border-radius:6px; border:1px solid #555;
    background:#000; color:white; }

  /* Miniature en direct de display.html : on affiche la vraie page dans un
     cadre plus petit que sa taille réelle, puis on la réduit visuellement
     avec un transform. L'iframe garde son propre viewport (960x540) donc
     tout ce qui est en vw/vh dans display.html se calcule normalement --
     seul le rendu final est mis à l'échelle, pas la mise en page. */
  .preview-wrapper {
    width: 280px; height: 157px;
    overflow: hidden; border-radius: 10px; border: 2px solid #444;
    position: relative; margin-bottom: 0.5rem;
  }
  .preview-frame {
    width: 960px; height: 540px; border: none;
    transform: scale(0.2917); /* 280/960 */
    transform-origin: top left;
    pointer-events: none; /* c'est un aperçu, pas une seconde télécommande */
  }
</style>
</head>
<body>
  <h1>Fletchtime — Poste de contrôle</h1>
  <div id="status">Connexion en cours...</div>

  <section>
    <h2 style="font-size:1rem; margin:0 0 0.5rem;">Aperçu de l'affichage</h2>
    <div class="preview-wrapper">
      <iframe src="display.html?lane=apercu" class="preview-frame" title="Aperçu écran"></iframe>
    </div>
    <button class="neutral" onclick="window.open('display.html?lane=1', '_blank')">
      Ouvrir en plein écran
    </button>
  </section>

  <section>
    <label>Mode Indoor :
      <select id="turn-mode">
        <option value="ab_then_cd">A-B puis C-D</option>
        <option value="cd_then_ab">C-D puis A-B</option>
        <option value="ab_only">A-B seulement</option>
        <option value="cd_only">C-D seulement</option>
      </select>
    </label>
    <label style="margin-left:1rem;">
      <input type="checkbox" id="alternate-relay" checked>
      Alterner l'ordre à chaque série
    </label><br>
    <button class="start" onclick="startIndoor()">▶ Démarrer Indoor</button>
    <br><br>
    <label>Mode Flint :
      <select id="flint-turn-mode">
        <option value="ab_then_cd">A-B puis C-D (chacun toute l'unité)</option>
        <option value="cd_then_ab">C-D puis A-B (chacun toute l'unité)</option>
        <option value="ab_only">A-B seulement</option>
        <option value="cd_only">C-D seulement</option>
      </select>
    </label><br>
    <button class="start" onclick="startFlint()">▶ Démarrer Flint</button>
  </section>

  <section>
    <button class="next" onclick="send({action:'next'})">Next ▶</button>
    <button class="neutral" onclick="send({action:'pause'})">⏸ Pause</button>
    <button class="neutral" onclick="send({action:'play'})">▶ Reprendre</button>
  </section>

  <section>
    <button class="danger" onclick="send({action:'stop'})">⏹ Arrêt du match</button>
    <button class="neutral" onclick="send({action:'restart'})">↻ Recommencer depuis le début</button>
  </section>

  <section>
    <label>Aller à : unité <input type="number" id="goto-unit" value="1" min="1" style="width:3.5em;">
      volée <input type="number" id="goto-end" value="1" min="1" style="width:3.5em;">
      flèche (walk-up) <input type="number" id="goto-arrow" value="0" min="0" style="width:3.5em;">
      relais <select id="goto-turn">
        <option value="">(peu importe)</option>
        <option value="A-B">A-B</option>
        <option value="C-D">C-D</option>
      </select>
    </label>
    <button class="neutral" onclick="sendGoto()">Aller à cette volée</button>
  </section>

  <section>
    <button class="danger" onclick="send({action:'emergency'})">🚨 Urgence</button>
    <button class="neutral" onclick="send({action:'resume'})">✅ Reprise après urgence</button>
  </section>

  <section>
    <input type="text" id="msg" placeholder="Message à afficher sur les écrans...">
    <button class="neutral" onclick="sendMessage()">Envoyer</button>
    <button class="neutral" onclick="send({action:'message', value:null})">Effacer</button>
  </section>

  <div id="state">En attente de connexion...</div>

<script>
  const statusEl = document.getElementById("status");
  const stateBox = document.getElementById("state");
  let ws;

  // Empêche l'écran du poste de contrôle de s'éteindre pendant le concours.
  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) {
        await navigator.wakeLock.request("screen");
      }
    } catch (e) { /* refusé (batterie faible, etc.) -- pas bloquant */ }
  }
  requestWakeLock();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") requestWakeLock();
  });

  function connect() {
    ws = new WebSocket("ws://" + location.hostname + ":8765");

    ws.onopen = () => statusEl.textContent = "Connecté au serveur.";
    ws.onclose = () => {
      statusEl.textContent = "⚠ Déconnecté -- nouvelle tentative dans 2s...";
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);
      if (data.type === "state") {
        const messageLine = "Message affiché : " + (data.message ? JSON.stringify(data.message) : "(aucun)");
        const stateLine = data.state
          ? JSON.stringify(data.state, null, 2)
          : "Aucun match en cours -- démarre un mode ci-dessus.";
        stateBox.textContent = messageLine + "\n\n" + stateLine;

        // Le mode A-B/C-D est fixé au démarrage et ne doit pas changer en
        // cours de match : on verrouille le sélecteur tant qu'un match
        // tourne (state non nul et pas encore terminé).
        const matchIsRunning = data.state && !data.state.finished;
        document.getElementById("turn-mode").disabled = matchIsRunning;
        document.getElementById("alternate-relay").disabled = matchIsRunning;
        document.getElementById("flint-turn-mode").disabled = matchIsRunning;
      }
    };
  }
  connect();

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }
  function startIndoor() {
    send({
      action: "start_indoor",
      turn_mode: document.getElementById("turn-mode").value,
      alternate: document.getElementById("alternate-relay").checked,
    });
  }
  function startFlint() {
    send({action: "start_flint", turn_mode: document.getElementById("flint-turn-mode").value});
  }
  function sendMessage() {
    const val = document.getElementById("msg").value;
    send({action: "message", value: val});
  }
  function sendGoto() {
    send({
      action: "goto",
      unit: parseInt(document.getElementById("goto-unit").value || "1", 10),
      end: parseInt(document.getElementById("goto-end").value || "1", 10),
      arrow: parseInt(document.getElementById("goto-arrow").value || "0", 10),
      turn: document.getElementById("goto-turn").value,
    });
  }
</script>
</body>
</html>
