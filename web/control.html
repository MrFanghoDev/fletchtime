<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<title>Fletchtime — Contrôle</title>
<style>
  body { font-family: sans-serif; background:#111; color:#eee; padding:1rem; margin:0; }
  h1 { font-size:1.3rem; display:flex; align-items:center; gap:0.5rem; }
  h1 img { height:1.6em; width:1.6em; }
  button {
    font-size:1.05rem; padding:0.7rem 1rem; margin:0.25rem; border-radius:8px;
    border:none; cursor:pointer; color:white;
  }
  .start { background:#2563eb; }
  .next { background:#16a34a; }
  .danger { background:#dc2626; }
  .neutral { background:#4b5563; }
  .lang-btn { background:#1f2937; font-size:0.85rem; padding:0.4rem 0.8rem; }
  .lang-btn.active { background:#2563eb; }
  .quick-messages { margin-top: 0.75rem; }
  .quick-messages-group { margin-bottom: 0.5rem; }
  .quick-messages-label {
    display: block; font-size: 0.75rem; opacity: 0.6; margin-bottom: 0.2rem;
  }
  button.quick {
    background:#374151; font-size: 0.85rem; padding: 0.4rem 0.7rem;
  }
  button:disabled, select:disabled, input:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  section { margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #333; }
  #status { font-size:0.9rem; opacity:0.7; margin-bottom:0.5rem; }
  #state {
    white-space:pre-wrap; background:#000; padding:0.8rem; border-radius:8px;
    font-family:monospace; font-size:0.85rem; max-height:40vh; overflow:auto;
  }
  input[type=text] { padding:0.6rem; width:55%; border-radius:6px; border:1px solid #555;
    background:#000; color:white; }

  /* Miniature en direct de display.html : on affiche la vraie page dans un
     cadre plus petit que sa taille réelle, puis on la réduit visuellement
     avec un transform. L'iframe garde son propre viewport (960x540) donc
     tout ce qui est en vw/vh dans display.html se calcule normalement --
     seul le rendu final est mis à l'échelle, pas la mise en page. */
  .preview-wrapper {
    width: 280px; height: 157px;
    overflow: hidden; border-radius: 10px; border: 2px solid #444;
    position: relative; margin-bottom: 0.5rem;
  }
  .preview-frame {
    width: 960px; height: 540px; border: none;
    transform: scale(0.2917); /* 280/960 */
    transform-origin: top left;
    pointer-events: none; /* c'est un aperçu, pas une seconde télécommande */
  }
</style>
</head>
<body>
  <h1><img src="logo.svg" alt=""><span data-i18n="controlTitle">Fletchtime — Poste de contrôle</span></h1>
  <div>
    <button class="lang-btn" id="lang-fr-btn" onclick="setLanguage('fr')">Français</button>
    <button class="lang-btn" id="lang-en-btn" onclick="setLanguage('en')">English</button>
  </div>
  <div id="status" data-i18n="connecting">Connexion en cours...</div>

  <section>
    <h2 style="font-size:1rem; margin:0 0 0.5rem;" data-i18n="previewTitle">Aperçu de l'affichage</h2>
    <div class="preview-wrapper">
      <iframe id="preview-frame" class="preview-frame" title="Aperçu écran"></iframe>
    </div>
    <button class="neutral" data-i18n="openFullscreen"
      onclick="window.open('display.html?lane=1', '_blank')">Ouvrir en plein écran</button>
  </section>

  <section>
    <label><span data-i18n="indoorModeLabel">Mode Indoor :</span>
      <select id="turn-mode">
        <option value="ab_then_cd" data-i18n="abThenCd">A-B puis C-D</option>
        <option value="cd_then_ab" data-i18n="cdThenAb">C-D puis A-B</option>
        <option value="ab_only" data-i18n="abOnly">A-B seulement</option>
        <option value="cd_only" data-i18n="cdOnly">C-D seulement</option>
      </select>
    </label>
    <label style="margin-left:1rem;">
      <input type="checkbox" id="alternate-relay" checked>
      <span data-i18n="alternateEachSeries">Alterner l'ordre à chaque série</span>
    </label><br>
    <button class="start" id="start-indoor-btn" data-i18n="startIndoor"
      onclick="startIndoor()">▶ Démarrer Indoor</button>
    <br><br>
    <label><span data-i18n="flintModeLabel">Mode Flint :</span>
      <select id="flint-turn-mode">
        <option value="ab_then_cd" data-i18n="abThenCd">A-B puis C-D</option>
        <option value="cd_then_ab" data-i18n="cdThenAb">C-D puis A-B</option>
        <option value="ab_only" data-i18n="abOnly">A-B seulement</option>
        <option value="cd_only" data-i18n="cdOnly">C-D seulement</option>
      </select>
    </label>
    <label style="margin-left:1rem;">
      <input type="checkbox" id="flint-alternate-relay" checked>
      <span data-i18n="alternateEachUnit">Alterner l'ordre à chaque unité</span>
    </label><br>
    <button class="start" id="start-flint-btn" data-i18n="startFlint"
      onclick="startFlint()">▶ Démarrer Flint</button>
  </section>

  <section>
    <button class="next" data-i18n="next" onclick="send({action:'next'})">Next ▶</button>
    <button class="neutral" id="pause-btn" data-i18n="pause"
      onclick="send({action:'pause'})" disabled>⏸ Pause</button>
    <button class="neutral" id="play-btn" data-i18n="resume"
      onclick="send({action:'play'})" disabled>▶ Reprendre</button>
  </section>

  <section>
    <button class="danger" id="stop-btn" data-i18n="stopMatch"
      onclick="send({action:'stop'})" disabled>⏹ Arrêt du match</button>
    <button class="neutral" id="restart-btn" data-i18n="restart"
      onclick="send({action:'restart'})" disabled>↻ Recommencer depuis le début</button>
  </section>

  <section>
    <label><span data-i18n="gotoLabel">Aller à : unité</span>
      <input type="number" id="goto-unit" value="1" min="1" style="width:3.5em;">
      <span data-i18n="gotoVolee">volée</span>
      <input type="number" id="goto-end" value="1" min="1" style="width:3.5em;">
      <span data-i18n="gotoArrow">flèche (walk-up)</span>
      <input type="number" id="goto-arrow" value="0" min="0" style="width:3.5em;">
      <span data-i18n="gotoRelay">relais</span>
      <select id="goto-turn">
        <option value="" data-i18n="gotoAny">(peu importe)</option>
        <option value="A-B">A-B</option>
        <option value="C-D">C-D</option>
      </select>
    </label>
    <button class="neutral" data-i18n="gotoButton" onclick="sendGoto()">Aller à cette volée</button>
  </section>

  <section>
    <button class="danger" id="emergency-btn" data-i18n="emergency"
      onclick="send({action:'emergency'})" disabled>🚨 Urgence</button>
    <button class="neutral" id="resume-btn" data-i18n="resumeAfterEmergency"
      onclick="send({action:'resume'})" disabled>✅ Reprise après urgence</button>
  </section>

  <section>
    <input type="text" id="msg" data-i18n-placeholder="messagePlaceholder"
      placeholder="Message à afficher sur les écrans...">
    <button class="neutral" data-i18n="send" onclick="sendMessage()">Envoyer</button>
    <button class="neutral" data-i18n="clear" onclick="send({action:'message', value:null})">Effacer</button>

    <div class="quick-messages" id="quick-messages"></div>
  </section>

  <div id="state">En attente de connexion...</div>

<script src="i18n.js"></script>
<script>
  const statusEl = document.getElementById("status");
  const stateBox = document.getElementById("state");
  let ws;
  let currentLanguage = localStorage.getItem("fletchtime_lang") || "fr";

  // Structure des messages rapides : (clé de catégorie, [clés de message]).
  const QUICK_MESSAGE_GROUPS = [
    ["quickCategoryDelay", ["delay5", "delay10", "delay15", "joinLane"]],
    ["quickCategoryPause", ["pause15", "lunchBreak", "resumingSoon"]],
    ["quickCategorySafety", ["stopShooting", "lineClear", "inspection"]],
    ["quickCategoryLogistics", ["returnScoresheets", "collectingScores", "equipmentCheck"]],
    ["quickCategoryWeather", ["weatherAlert", "weatherResume"]],
    ["quickCategoryEnd", ["competitionEnd", "resultsSoon", "awards"]],
  ];

  function renderQuickMessages() {
    const container = document.getElementById("quick-messages");
    container.innerHTML = "";
    QUICK_MESSAGE_GROUPS.forEach(([categoryKey, messageKeys]) => {
      const group = document.createElement("div");
      group.className = "quick-messages-group";

      const label = document.createElement("span");
      label.className = "quick-messages-label";
      label.textContent = t(currentLanguage, categoryKey);
      group.appendChild(label);

      messageKeys.forEach((key) => {
        const text = t(currentLanguage, "quickMessages")[key];
        const btn = document.createElement("button");
        btn.className = "quick";
        btn.textContent = text;
        btn.onclick = () => fillMsg(text);
        group.appendChild(btn);
      });

      container.appendChild(group);
    });
  }

  function applyTranslations() {
    document.title = t(currentLanguage, "controlTitle");
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      el.textContent = t(currentLanguage, el.getAttribute("data-i18n"));
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
      el.placeholder = t(currentLanguage, el.getAttribute("data-i18n-placeholder"));
    });
    document.getElementById("lang-fr-btn").classList.toggle("active", currentLanguage === "fr");
    document.getElementById("lang-en-btn").classList.toggle("active", currentLanguage === "en");
    renderQuickMessages();
  }

  function setLanguage(lang) {
    currentLanguage = lang;
    localStorage.setItem("fletchtime_lang", lang);
    applyTranslations();
    send({action: "set_language", value: lang});
  }

  applyTranslations();

  // Empêche l'écran du poste de contrôle de s'éteindre pendant le concours.
  async function requestWakeLock() {
    try {
      if ("wakeLock" in navigator) {
        await navigator.wakeLock.request("screen");
      }
    } catch (e) { /* refusé (batterie faible, etc.) -- pas bloquant */ }
  }
  requestWakeLock();

  // Force le rechargement de la miniature à chaque ouverture de la page,
  // pour éviter d'afficher une version périmée mise en cache par le
  // navigateur (l'iframe pointe vers le même display.html que les vrais
  // écrans, donc doit toujours refléter la version la plus récente).
  document.getElementById("preview-frame").src = "display.html?lane=apercu&_=" + Date.now();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") requestWakeLock();
  });

  let hasSyncedLanguageFromServer = false;

  function connect() {
    ws = new WebSocket("ws://" + location.hostname + ":8765");

    ws.onopen = () => statusEl.textContent = t(currentLanguage, "connected");
    ws.onclose = () => {
      statusEl.textContent = t(currentLanguage, "disconnected");
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);
      if (data.type === "state") {
        // À la toute première connexion, on adopte la langue déjà diffusée
        // par le serveur (au cas où un autre poste de contrôle l'aurait
        // déjà changée), plutôt que d'imposer la préférence locale.
        if (!hasSyncedLanguageFromServer) {
          hasSyncedLanguageFromServer = true;
          if (data.language && data.language !== currentLanguage) {
            currentLanguage = data.language;
            localStorage.setItem("fletchtime_lang", currentLanguage);
            applyTranslations();
          }
        }

        const safeToShow = !data.state || data.state.finished
          || data.state.phase === "pause" || data.state.phase === "emergency";
        const messageStatus = !data.message
          ? t(currentLanguage, "messageNone")
          : JSON.stringify(data.message) + " -- " + (safeToShow ? t(currentLanguage, "messageShown") : t(currentLanguage, "messageWaiting"));
        const messageLine = t(currentLanguage, "messageLabel") + " : " + messageStatus;
        const stateLine = data.state
          ? JSON.stringify(data.state, null, 2)
          : t(currentLanguage, "noMatch");
        stateBox.textContent = messageLine + "\n\n" + stateLine;

        // Le mode A-B/C-D est fixé au démarrage et ne doit pas changer en
        // cours de match : on verrouille le sélecteur tant qu'un match
        // tourne (state non nul et pas encore terminé).
        const hasMatch = !!data.state;
        const matchIsRunning = hasMatch && !data.state.finished;
        document.getElementById("turn-mode").disabled = matchIsRunning;
        document.getElementById("alternate-relay").disabled = matchIsRunning;
        document.getElementById("flint-turn-mode").disabled = matchIsRunning;
        document.getElementById("flint-alternate-relay").disabled = matchIsRunning;
        document.getElementById("start-indoor-btn").disabled = matchIsRunning;
        document.getElementById("start-flint-btn").disabled = matchIsRunning;

        // Stop/Pause/Reprendre n'ont de sens que pendant un match actif ;
        // Recommencer reste utile même après la fin (relance depuis le début).
        document.getElementById("stop-btn").disabled = !matchIsRunning;
        document.getElementById("pause-btn").disabled = !matchIsRunning;
        document.getElementById("play-btn").disabled = !matchIsRunning;
        document.getElementById("restart-btn").disabled = !hasMatch;

        // Urgence : seulement pendant un match actif, pas déjà en urgence.
        // Reprise : seulement quand on est effectivement en urgence.
        const inEmergency = hasMatch && data.state.phase === "emergency";
        document.getElementById("emergency-btn").disabled = !matchIsRunning || inEmergency;
        document.getElementById("resume-btn").disabled = !inEmergency;
      }
    };
  }
  connect();

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }
  function startIndoor() {
    send({
      action: "start_indoor",
      turn_mode: document.getElementById("turn-mode").value,
      alternate: document.getElementById("alternate-relay").checked,
    });
  }
  function startFlint() {
    send({
      action: "start_flint",
      turn_mode: document.getElementById("flint-turn-mode").value,
      alternate: document.getElementById("flint-alternate-relay").checked,
    });
  }
  function sendMessage() {
    const val = document.getElementById("msg").value;
    send({action: "message", value: val});
  }
  function fillMsg(text) {
    const input = document.getElementById("msg");
    input.value = text;
    input.focus();
  }
  function sendGoto() {
    send({
      action: "goto",
      unit: parseInt(document.getElementById("goto-unit").value || "1", 10),
      end: parseInt(document.getElementById("goto-end").value || "1", 10),
      arrow: parseInt(document.getElementById("goto-arrow").value || "0", 10),
      turn: document.getElementById("goto-turn").value,
    });
  }
</script>
</body>
</html>
